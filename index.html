DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:380px;
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.logo{
    width:120px;
    height:auto;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

label{
    display:block;
    text-align:left;
    margin-top:10px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:25px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#003366;
    color:white;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}
</style>

</head>

<body>

<div class="container">

    <img src="logo.jpg.jpg" class="logo" alt="College Logo">

    <h2>Adhiparasakthi Engineering College</h2>

    <form action="https://formspree.io/f/mkolyajk" method="POST">

        <label>Process 1</label>
        <input type="text" name="process1" placeholder="Enter Process 1" required>

        <label>Process 2</label>
        <input type="text" name="process2" placeholder="Enter Process 2" required>

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
